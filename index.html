<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenas Pokedex</title>
    <link rel="shortcut icon" href="./assets/icons/pokeball-green.svg" type="image/x-icon">

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>

    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/assets.css">
</head>
<body onload="init()">
    <header class="wrapper border-big fixed-header">
            <div>
                <img src="./assets/icons/pokeball-green.svg" alt="Poké Ball">
                <span>Elenas Pokédex</span>
            </div>
            <div>
                <label for="#Search">Search Pokémon:</label>
                <input id="#Search" class="input-search" 
                    type="search" name="search" 
                    minlength="3" placeholder="min 3 lts" required
                    onkeyup="pressEnter(event, 'search')">
                <button onclick="checkSearchInput()"
                    type="submit" class="btn-icon">
                    <img src="./assets/icons/search.svg" 
                        alt="search for Pokémon">
                </button>
            </div>
    </header>
    <main id="#PageStart" class="wrapper">
        <img id="#LoadingSpinner"
            class="d-none"
            src="./assets/icons/pokeball-green.svg" 
            alt="Poké Ball">      
        <h1>Elenas Pokédex</h1>
        <ul id="#PokemonList"
            class="container-pokemon-cards d-none">
        </ul>
        <div id="#NoPokemonsFound"></div>
        <div id="#LoadMoreButton"
            class="container-load-more-button">
        </div>

        <dialog id="#Dialog" closedby="any">
            <div id="#PokemonOverlay"
                class="pokemon-overlay">
            </div>
        </dialog>
        
    </main>
    <footer class="wrapper border-big">
        <a href="##PageStart">
            <img onclick="showAllLoadedPokemon()"
                src="./assets/icons/pokeball-green.svg" 
                alt="to the start of the page">
        </a>
    </footer>
</body>
</html>
